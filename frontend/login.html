<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #e0f7fa, #ecfeff, #e6fffa);
}

/* BACK BUTTON */
.back-btn {
  position: absolute;
  top: 20px;
  left: 15px;
  padding: 10px 18px;
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

/* ✨ Typing Text */
.typing-text {
  font-size: 26px;
  font-weight: 600;
  color: #0f172a;
  margin-bottom: 10px;
  height: 32px;
}

.sub-text {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 25px;
}

/* CARD */
.box {
  width: 370px;
  padding: 40px;
  border-radius: 22px;
  background: white;
  box-shadow: 0 25px 60px rgba(0,0,0,0.08);
  text-align: center;
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-4px);
}

/* INPUT */
input {
  width: 100%;
  padding: 13px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
  transition: 0.3s;
}

input:focus {
  outline: none;
  border-color: #06b6d4;
  box-shadow: 0 0 0 3px rgba(6,182,212,0.15);
}

/* BUTTON */
button {
  width: 100%;
  padding: 13px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #06b6d4, #38bdf8);
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(6,182,212,0.3);
}

/* MESSAGE */
#msg {
  margin-top: 12px;
  font-size: 14px;
  font-weight: bold;
}

.success { color: green; }
.error { color: red; }

.extra {
  margin-top: 18px;
}

.extra a {
  color: #06b6d4;
  text-decoration: none;
  font-size: 14px;
}

.extra a:hover {
  text-decoration: underline;
}
</style>

</head>

<body>

<button class="back-btn" onclick="goBack()">← Back</button>

<!-- ✨ Typing -->
<div class="typing-text" id="typing"></div>
<div class="sub-text">Take a moment. Breathe. You’re safe here.</div>

<!-- FORM -->
<div class="box">

<input id="email" placeholder="Email address">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

<div class="extra">
  <a href="register.html">Create New Account</a>
</div>

</div>

<script>

/* ✨ Typing Effect */
const texts = [
  "Welcome back to EmoHeal.",
  "Let’s take care of your mind today!"
];

let textIndex = 0;
let charIndex = 0;
let currentText = "";
let isDeleting = false;

function typeEffect() {
  let display = document.getElementById("typing");
  let fullText = texts[textIndex];

  if (!isDeleting) {
    currentText = fullText.substring(0, charIndex++);
  } else {
    currentText = fullText.substring(0, charIndex--);
  }

  display.innerText = currentText;

  if (!isDeleting && charIndex === fullText.length) {
    isDeleting = true;
    setTimeout(typeEffect, 1200);
    return;
  }

  if (isDeleting && charIndex === 0) {
    isDeleting = false;
    textIndex = (textIndex + 1) % texts.length;
  }

  setTimeout(typeEffect, isDeleting ? 40 : 70);
}

typeEffect();


// 🔥 ORIGINAL LOGIN LOGIC (UNCHANGED)
async function login(){

  const emailVal = document.getElementById("email").value.trim();
  const passwordVal = document.getElementById("password").value.trim();

  if(!emailVal || !passwordVal){
    msg.innerHTML = "<span class='error'>Fill all fields ❌</span>";
    return;
  }

  let res = await fetch("/api/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: emailVal,
      password: passwordVal
    })
  });

  let data = await res.json();

  msg.innerHTML = data.message;

  if(data.message.includes("Successful")){
    localStorage.setItem("loggedInUser", data.username);

    setTimeout(()=>{
      window.location.href="index.html";
    },1000);
  }
}

// 🔙 BACK
function goBack(){
  window.location.href = "guest_user.html";
}

// 🔐 AUTO REDIRECT
if(localStorage.getItem("loggedInUser")){
  window.location.href = "index.html";
}

</script>

</body>
</html>
