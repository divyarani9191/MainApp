<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  overflow: hidden;
  background: linear-gradient(135deg, #e0f7fa, #ecfeff);
}

/* 🌈 BACKGROUND BLOBS */
body::before,
body::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  z-index: 0;
  animation: float 8s infinite alternate ease-in-out;
}

body::before {
  width: 320px;
  height: 320px;
  background: #bae6fd;
  top: -80px;
  left: -80px;
}

body::after {
  width: 260px;
  height: 260px;
  background: #fbcfe8;
  bottom: -70px;
  right: -70px;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(25px); }
}

/* BACK BUTTON */
.back-btn {
  position: absolute;
  top: 20px;
  left: 15px;
  padding: 10px 18px;
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  z-index: 2;
}

/* ✨ TYPING */
.typing-text {
  position: relative;
  z-index: 1;
  font-size: 26px;
  font-weight: 600;
  color: #0f172a;
  margin-bottom: 20px;
  height: 32px;
}

/* CARD */
.box {
  position: relative;
  z-index: 1;

  width: 340px;
  padding: 25px;

  border-radius: 18px;

  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);

  box-shadow: 
    0 10px 40px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.4);

  text-align: center;
}

/* headings */
.title {
  font-size: 16px;
  color: #0f172a;
  margin-bottom: 10px;
}

.sub {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 10px;
}

/* inputs */
input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.6);

  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);

  font-size: 14px;
  transition: 0.25s;
}

input:focus {
  outline: none;
  border-color: #06b6d4;
  box-shadow: 0 0 0 3px rgba(6,182,212,0.2);
  background: rgba(255,255,255,0.7);
}

/* button */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;

  border-radius: 14px;
  border: none;

  background: linear-gradient(135deg, #06b6d4, #38bdf8);
  color: white;
  font-weight: 600;

  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(6,182,212,0.35);
}

/* message */
#message {
  margin-top: 10px;
  font-size: 14px;
  font-weight: bold;
}

.success { color: green; }
.error { color: red; }

</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">← Back</button>

<!-- ✨ Typing -->
<div class="typing-text" id="typing"></div>

<!-- FORM -->
<div class="box">

<div class="title">Create your account</div>
<div class="sub">It takes less than a minute ✨</div>

<input id="name" placeholder="Full Name">
<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="sendOTP()">Send OTP</button>

<input id="otpInput" placeholder="Enter OTP">

<button onclick="register()">Register</button>

<p id="message"></p>

</div>

<script>

/* ✨ Typing */
const texts = [
  "Join EmoHeal.",
  "Feel better, one step at a time",
  "You deserve peace"
];

let textIndex = 0;
let charIndex = 0;
let currentText = "";
let isDeleting = false;

function typeEffect() {
  let display = document.getElementById("typing");
  let fullText = texts[textIndex];

  if (!isDeleting) {
    currentText = fullText.substring(0, charIndex++);
  } else {
    currentText = fullText.substring(0, charIndex--);
  }

  display.innerText = currentText;

  if (!isDeleting && charIndex === fullText.length) {
    isDeleting = true;
    setTimeout(typeEffect, 1200);
    return;
  }

  if (isDeleting && charIndex === 0) {
    isDeleting = false;
    textIndex = (textIndex + 1) % texts.length;
  }

  setTimeout(typeEffect, isDeleting ? 40 : 70);
}

typeEffect();


// 🔥 ORIGINAL LOGIC (UNCHANGED)

// SEND OTP
async function sendOTP(){
  const email = document.getElementById("email").value;

  if(!email){
    message.innerHTML = "<span class='error'>Enter email first ❌</span>";
    return;
  }

  let res = await fetch("/api/send-otp", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email})
  });

  let data = await res.json();
  message.innerHTML = data.message;
}

// REGISTER
async function register(){
  const user = {
    name: name.value,
    username: username.value,
    email: email.value,
    password: password.value,
    otp: otpInput.value
  };

  if(!user.email || !user.password || !user.otp){
    message.innerHTML = "<span class='error'>Fill all fields ❌</span>";
    return;
  }

  let res = await fetch("/api/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(user)
  });

  let data = await res.json();
  message.innerHTML = data.message;

  if(data.message.includes("Successfully")){
    setTimeout(()=>{
      window.location.href="login.html";
    },1500);
  }
}

// BACK
function goBack(){
  window.location.href="guest_user.html";
}

</script>

</body>
</html>
