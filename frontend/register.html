<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EmoHeal Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #e0f7fa, #ecfeff);
}

.container {
  width: 350px;
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.7);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #06b6d4;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #0891b2;
}

#message {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <h2>Create Account</h2>

  <!-- REGISTER FORM -->
  <form id="registerForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Send OTP</button>
  </form>

  <!-- VERIFY FORM -->
  <form id="verifyForm" style="display:none;">
    <input type="email" id="verifyEmail" readonly>
    <input type="text" id="otp" placeholder="Enter OTP" required>

    <button type="submit">Verify & Register</button>
  </form>

  <div id="message"></div>

</div>

<script>
const registerForm = document.getElementById("registerForm");
const verifyForm = document.getElementById("verifyForm");
const message = document.getElementById("message");

const verifyEmail = document.getElementById("verifyEmail");

let userData = {};

/* STEP 1: SEND OTP */
registerForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  userData = {
    name: document.getElementById("name").value,
    username: document.getElementById("username").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  message.innerText = "Sending OTP...";

  try {
    const res = await fetch("http://localhost:5000/api/send-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email: userData.email })
    });

    const data = await res.json();

    if (res.ok) {
      message.innerText = "OTP sent to email ✅";
      registerForm.style.display = "none";
      verifyForm.style.display = "block";
      verifyEmail.value = userData.email;
    } else {
      message.innerText = data.message || "Error sending OTP ❌";
    }

  } catch (err) {
    message.innerText = "Server error ❌";
    console.error(err);
  }
});


/* STEP 2: VERIFY OTP + REGISTER */
verifyForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const otp = document.getElementById("otp").value;

  message.innerText = "Verifying...";

  try {
    const res = await fetch("http://localhost:5000/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: userData.email,
        otp: otp,
        name: userData.name,
        username: userData.username,
        password: userData.password
      })
    });

    const data = await res.json();

    if (res.ok) {
      message.innerText = "Registration successful 🎉";

      setTimeout(() => {
        window.location.href = "login2.html";
      }, 1500);

    } else {
      message.innerText = data.message || "Invalid OTP ❌";
    }

  } catch (err) {
    message.innerText = "Server error ❌";
    console.error(err);
  }
});
</script>

</body>
</html>
